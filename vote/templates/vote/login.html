{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mathenge Voting</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="form-container">
        <h2>Login</h2>

        <!-- Display form errors -->
        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <!-- Admission Number -->
            <label for="id_admission_number">Admission Number</label>
            <input type="text" name="admission_number" id="id_admission_number" 
                   value="{{ request.POST.admission_number|default_if_none:'' }}" required>

            <!-- Password -->
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" required>

            <button type="submit">Login</button>
        </form>

        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
    </div>
</body>
</html>
